name: TypeScript SDK

on:
  push:
    branches: [ "main" ]
    paths:
      - 'packages/client/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'packages/client/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./packages/client

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './packages/client/package-lock.json'
        
    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Build SDK
      run: npm run build

components:
  schemas:
    IngestSynapse:
      description: "Sent by client/validator to a miner to store an embedding.\n\n\
        Request:  text OR raw_embedding (one must be provided)\nResponse: cid (set\
        \ by miner on success)\n\nPrivate collections \u2014 two auth modes (prefer\
        \ sig-based):\n  Sig-based  (secure):  namespace + namespace_hotkey + namespace_sig\
        \ + namespace_timestamp_ms\n  Key-based  (legacy):  namespace + namespace_key"
      properties:
        text:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: Raw text to embed and store. Mutually exclusive with raw_embedding.
          title: Text
        raw_embedding:
          anyOf:
          - items:
              type: number
            type: array
          - type: 'null'
          default: null
          description: Pre-computed embedding vector. Skips the embedding step on
            the miner.
          title: Raw Embedding
        metadata:
          additionalProperties: true
          description: Arbitrary key-value metadata stored alongside the vector.
          title: Metadata
          type: object
        model_version:
          default: v1
          description: Subnet model epoch version for CID generation.
          title: Model Version
          type: string
        namespace:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: Private collection name.
          title: Namespace
        namespace_hotkey:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: Bittensor SS58 hotkey that owns this namespace.
          title: Namespace Hotkey
        namespace_sig:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: "sr25519 hex signature over 'engram-ns:{namespace}:{namespace_timestamp_ms}'.\
            \ Replaces namespace_key \u2014 key never travels over the wire."
          title: Namespace Sig
        namespace_timestamp_ms:
          anyOf:
          - type: integer
          - type: 'null'
          default: null
          description: "Unix ms timestamp for namespace_sig replay prevention (\xB1\
            60s window)."
          title: Namespace Timestamp Ms
        namespace_key:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: '[Deprecated] Secret key for the namespace. Use namespace_sig
            instead.'
          title: Namespace Key
        cid:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: Content identifier returned by the miner.
          title: Cid
        error:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: Error message if ingest failed.
          title: Error
      title: IngestSynapse
      type: object
    QuerySynapse:
      description: 'Sent by validator/client to miners for approximate nearest-neighbor
        search.


        Request:  query_text OR query_vector, top_k

        Response: results (list of CID + score + metadata)'
      properties:
        query_text:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Query Text
        query_vector:
          anyOf:
          - items:
              type: number
            type: array
          - type: 'null'
          default: null
          title: Query Vector
        top_k:
          default: 10
          maximum: 100
          minimum: 1
          title: Top K
          type: integer
        namespace:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Namespace
        namespace_hotkey:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Namespace Hotkey
        namespace_sig:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Namespace Sig
        namespace_timestamp_ms:
          anyOf:
          - type: integer
          - type: 'null'
          default: null
          title: Namespace Timestamp Ms
        namespace_key:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Namespace Key
        results:
          description: List of {cid, score, metadata} dicts ordered by descending
            similarity.
          items:
            additionalProperties: true
            type: object
          title: Results
          type: array
        latency_ms:
          anyOf:
          - type: number
          - type: 'null'
          default: null
          description: Miner-reported query latency in milliseconds.
          title: Latency Ms
        error:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Error
      title: QuerySynapse
      type: object
    ChallengeSynapse:
      description: 'Validator issues a storage proof challenge to a miner.


        Request:  cid + nonce_hex + expires_at

        Response: embedding_hash + proof (HMAC)


        The Rust engram_core module handles challenge generation and verification.'
      properties:
        cid:
          description: CID the miner is being challenged to prove storage of.
          title: Cid
          type: string
        nonce_hex:
          description: 32-byte random nonce as hex string.
          title: Nonce Hex
          type: string
        expires_at:
          description: Unix timestamp after which the proof is invalid.
          title: Expires At
          type: integer
        embedding_hash:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: SHA-256 of the stored embedding bytes (hex).
          title: Embedding Hash
        proof:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          description: HMAC-SHA256(nonce || embedding_hash) proving possession.
          title: Proof
        error:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Error
      required:
      - cid
      - nonce_hex
      - expires_at
      title: ChallengeSynapse
      type: object
    KeyShareSynapse:
      description: "Client deposits one Shamir key share with a miner for threshold\
        \ decryption.\n\nThe miner stores the share associated with the namespace.\
        \ It cannot reconstruct\nthe full key alone \u2014 that requires K miners\
        \ to cooperate at retrieval time.\n\nAuth: namespace_hotkey + namespace_sig\
        \ + namespace_timestamp_ms (sig-based only)."
      properties:
        namespace:
          description: Namespace this share belongs to.
          title: Namespace
          type: string
        share_index:
          description: 1-based share index (1..total).
          title: Share Index
          type: integer
        share_hex:
          description: Hex-encoded share bytes.
          title: Share Hex
          type: string
        threshold:
          description: Minimum shares needed to reconstruct (k).
          title: Threshold
          type: integer
        total:
          description: Total shares created (n).
          title: Total
          type: integer
        namespace_hotkey:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Namespace Hotkey
        namespace_sig:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Namespace Sig
        namespace_timestamp_ms:
          anyOf:
          - type: integer
          - type: 'null'
          default: null
          title: Namespace Timestamp Ms
        stored:
          default: false
          title: Stored
          type: boolean
        error:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Error
      required:
      - namespace
      - share_index
      - share_hex
      - threshold
      - total
      title: KeyShareSynapse
      type: object
    KeyShareRetrieve:
      description: 'Client retrieves its key share from a miner.


        The miner returns the share only after verifying namespace ownership.

        The client collects K shares from K different miners and reconstructs locally.


        Auth: namespace_hotkey + namespace_sig + namespace_timestamp_ms.'
      properties:
        namespace:
          description: Namespace to retrieve the share for.
          title: Namespace
          type: string
        namespace_hotkey:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Namespace Hotkey
        namespace_sig:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Namespace Sig
        namespace_timestamp_ms:
          anyOf:
          - type: integer
          - type: 'null'
          default: null
          title: Namespace Timestamp Ms
        share_index:
          anyOf:
          - type: integer
          - type: 'null'
          default: null
          title: Share Index
        share_hex:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Share Hex
        threshold:
          anyOf:
          - type: integer
          - type: 'null'
          default: null
          title: Threshold
        total:
          anyOf:
          - type: integer
          - type: 'null'
          default: null
          title: Total
        error:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Error
      required:
      - namespace
      title: KeyShareRetrieve
      type: object
